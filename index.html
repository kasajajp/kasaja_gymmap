<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エニタイムフィットネス マップ検索</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; height: 100vh; background-color: #f4f4f9; }
        #sidebar { width: 380px; background: white; box-shadow: 2px 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; z-index: 1001; }
        #search-box { padding: 20px; background: #7331c6; color: white; display: flex; flex-direction: column; gap: 10px; }
        #search-box h2 { margin: 0 0 5px 0; font-size: 18px; }
        .search-row { display: flex; gap: 8px; }
        #searchInput { flex: 1; padding: 10px; font-size: 15px; border: none; border-radius: 4px; }
        #searchBtn { padding: 10px 15px; background: #ffbc00; color: #333; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; font-weight: bold; transition: 0.2s; }
        #searchBtn:hover { background: #e0a500; }
        #results { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .gym-card { padding: 15px; background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .gym-card:hover { background: #f9f5ff; border-color: #7331c6; }
        .gym-name { font-weight: bold; color: #333; font-size: 16px; margin-bottom: 5px; }
        .gym-info { font-size: 13px; color: #666; margin: 3px 0; }
        .gym-distance { display: inline-block; margin-top: 5px; padding: 2px 6px; background: #eee; border-radius: 4px; font-size: 12px; font-weight: bold; color: #555; }
        #map { flex: 1; height: 100%; }
        .popup-link { display: inline-block; margin-top: 8px; padding: 5px 10px; background: #7331c6; color: white; text-decoration: none; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="search-box">
            <h2>Anytime Fitness 検索</h2>
            <div class="search-row">
                <input type="text" id="searchInput" placeholder="例: 葛西, 江戸川区" onkeypress="if(event.key==='Enter') searchGyms()">
                <button id="searchBtn" onclick="searchGyms()">検索</button>
            </div>
        </div>
        <div id="results">
            <div style="color: #999; text-align: center; margin-top: 20px;">検索ワードを入力してください</div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        // 1. 地図の初期化
        const map = L.map('map').setView([35.6812, 139.7671], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let allGymData = [];
        let markers = [];

        // 2. 本物の緯度経度が入ったデータを読み込む
        fetch('gym_data_all.json')
            .then(response => response.json())
            .then(data => {
                allGymData = data;
                console.log("データ読み込み完了:", allGymData.length, "店舗");
            })
            .catch(error => console.error("データ読み込みエラー:", error));

        // 2点間の距離を計算する関数（三平方の定理）
        defGetDistance = (lat1, lng1, lat2, lng2) => {
            const r = 6371; // 地球の半径 (km)
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            return 2 * r * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        };

        function clearMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
        }

        // 3. 🔍 検索処理
        function searchGyms() {
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) return;

            // ① まず「キーワード（葛西）」が文字として含まれる店舗だけを厳密に抽出
            const baseGyms = allGymData.filter(gym => {
                return (gym.address || "").includes(keyword) || (gym.name || "").includes(keyword);
            });

            clearMarkers();
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            if (baseGyms.length === 0) {
                resultsDiv.innerHTML = '<div style="color:red; text-align:center; padding:20px;">店舗が見つかりませんでした。</div>';
                return;
            }

            // ② 抽出された最初の店舗の座標を「基準点」にする
            const centerGym = baseGyms.find(g => g.lat && g.lng);
            if (!centerGym) {
                resultsDiv.innerHTML = '<div style="color:red; text-align:center; padding:20px;">該当店舗の座標データがありません。</div>';
                return;
            }
            const baseLat = centerGym.lat;
            const baseLng = centerGym.lng;

            // ③ 基準点からの距離を計算して、近い順に並び替える
            const processedGyms = baseGyms.map(gym => {
                let distance = 9999;
                if (gym.lat && gym.lng) {
                    distance = defGetDistance(baseLat, baseLng, gym.lat, gym.lng);
                }
                return { ...gym, distance: distance };
            }).sort((a, b) => a.distance - b.distance);

            // ④ 左側の一覧と、右側のマップにピンを同時に描画
            processedGyms.forEach((gym, i) => {
                if (!gym.lat || !gym.lng) return;

                // 地図にピンを立てる
                const marker = L.marker([gym.lat, gym.lng]).addTo(map)
                    .bindPopup(`<b>${gym.name}</b><br>${gym.address}<br>料金: ${gym.price}<br><a class="popup-link" href="${gym.url}" target="_blank">店舗サイト</a>`);
                markers.push(marker);

                // 左側のサイドバーにカードを生成
                const card = document.createElement('div');
                card.className = 'gym-card';
                card.innerHTML = `
                    <div class="gym-name">${gym.name}</div>
                    <div class="gym-info">📍 ${gym.address}</div>
                    <div class="gym-info">💳 料金: ${gym.price}</div>
                    <div class="gym-distance">${keyword} から約 ${gym.distance.toFixed(1)} km</div>
                `;

                // カードをクリックしたらそのピンへジャンプしてポップアップを開く
                card.onclick = () => {
                    map.setView([gym.lat, gym.lng], 15);
                    marker.openPopup();
                };

                resultsDiv.appendChild(card);
            });

            // 最後に、一番近い店舗（基準点）にマップをジャンプさせる
            map.setView([baseLat, baseLng], 14);
        }
    </script>
</body>
</html>
