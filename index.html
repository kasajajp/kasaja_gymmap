<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymMap ジムマップ | 全国店舗の月額料金を地図で比較</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <header class="site-header">
        <div class="header-logo">
            <span class="logo-emoji">🏋️</span>
            <span class="logo-text">GymMap</span>
            <span class="logo-sub">ジムマップ</span>
        </div>
        <nav class="header-nav">
            <a href="https://kasajajp.github.io/">KASAJA.jp ホーム</a>
        </nav>
    </header>

    <section class="hero-section">
        <div class="hero-content">
            <h1>エニタイムフィットネス全国店舗の月額料金を地図で比較</h1>
            
            <div class="comparison-box">
                <p class="comparison-note">例えば...</p>
                <p class="comparison-text">エニタイムフィットネスは全国どこでも利用できるのに<br>入会する店舗によって月額料金に大きな差があります</p>
                <div class="price-display">
                    <div class="price-item">
                        <span class="shop-name">A店</span>
                        <span class="price-value">9,800円</span>
                    </div>
                    <div class="price-divider">/</div>
                    <div class="price-item">
                        <span class="shop-name">B店</span>
                        <span class="price-value">6,800円</span>
                    </div>
                </div>
            </div>

            <div class="main-search-bar">
                <div class="search-input-wrapper">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="stationInput" placeholder="駅名・地名で検索" onkeypress="handleKeyPress(event)">
                </div>
                <button class="btn-current-location" onclick="searchCurrentLocation()">
                    <i class="fa-solid fa-location-crosshairs"></i> 現在地点で検索
                </button>
            </div>
        </div>
    </section>

    <main class="main-container">
        <div class="layout-flex">
            <div class="left-panel">
                <section class="gym-list-section">
                    <h2 class="section-title">📌 周辺のおすすめジム一覧</h2>
                    <div class="gym-grid" id="gymGrid">
                        </div>
                </section>
            </div>

            <div class="right-panel">
                <div id="map"></div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; GymMap / KASAJA.jp All Rights Reserved.</p>
    </footer>

    <script>
        // 地図とデータのスクリプト（前回同様のロジック）
        const map = L.map('map').setView([35.6812, 139.7671], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function handleKeyPress(event) {
            if (event.key === 'Enter') searchStation();
        }

        function searchCurrentLocation() {
            alert("ブラウザの位置情報を使用して周辺のジムを検索します。");
            // 実際の位置情報取得ロジックをここに書くことができます
        }
        
        // ※以前の gymData や renderGyms 関数をここに続けて記述してください
    </script>
</body>
</html>
