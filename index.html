<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymMap ジムマップ | 全国店舗の月額料金を地図で比較</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <header class="site-header">
        <div class="header-logo">
            <span class="logo-emoji">🏋️</span>
            <span class="logo-text">GymMap</span>
            <span class="logo-sub">ジムマップ</span>
        </div>
        <nav class="header-nav">
            <a href="https://kasajajp.github.io/">KASAJA.jp ホーム</a>
        </nav>
    </header>

    <section class="hero-section">
        <div class="hero-content">
            <h1>エニタイムフィットネス全国店舗の月額料金を地図で比較</h1>
            
            <div class="comparison-box">
                <p class="comparison-note">例えば...</p>
                <p class="comparison-text">エニタイムフィットネスは全国どこでも利用できるのに<br>入会する店舗によって月額料金に大きな差があります</p>
                <div class="price-display">
                    <div class="price-item">
                        <span class="shop-name">A店</span>
                        <span class="price-value">9,800円</span>
                    </div>
                    <div class="price-divider">/</div>
                    <div class="price-item">
                        <span class="shop-name">B店</span>
                        <span class="price-value">6,800円</span>
                    </div>
                </div>
            </div>

            <div class="main-search-bar">
                <div class="search-input-wrapper">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="stationInput" placeholder="駅名・地名を入力（例：瑞江、渋谷）" onkeypress="handleKeyPress(event)">
                    <button class="search-submit-btn" onclick="searchStation()"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
                <button class="btn-current-location" onclick="searchCurrentLocation()">
                    <i class="fa-solid fa-location-crosshairs"></i> 現在地点で検索
                </button>
            </div>
        </div>
    </section>

    <section class="filter-section">
        <div class="filter-container">
            <div class="filter-item">
                <select>
                    <option>エニタイムフィットネス</option>
                </select>
            </div>
            <div class="filter-item">
                <select>
                    <option>すべてのプラン</option>
                </select>
            </div>
            <div class="filter-item slider-item">
                <span class="filter-label">料金:</span>
                <input type="range" min="5000" max="15000" value="10000">
                <span class="filter-val-badge">¥10,000</span>
            </div>
            <div class="filter-item slider-item">
                <span class="filter-label">距離:</span>
                <input type="range" min="1" max="30" value="10">
                <span class="filter-val-badge">10km</span>
            </div>
            <div class="filter-item sort-item">
                <span class="filter-label">並び順:</span>
                <button class="btn-sort active">料金順</button>
                <button class="btn-sort">距離順</button>
            </div>
        </div>
    </section>

    <main class="main-container">
        <div class="layout-flex">
            
            <div class="left-panel">
                <div class="results-header">
                    <h2>検索結果</h2>
                    <span class="results-count" id="resultsCount">3店舗</span>
                </div>
                <div class="gym-grid" id="gymGrid">
                    </div>
            </div>

            <div class="right-panel">
                <div class="map-header">
                    <h2>店舗マップ</h2>
                </div>
                <div id="map"></div>
            </div>

        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; GymMap / KASAJA.jp All Rights Reserved.</p>
    </footer>

    <script>
        // 地図の初期化（最初はスクショにあった「瑞江駅」周辺を開く設定にしています）
        const map = L.map('map').setView([35.6931, 139.8979], 14);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // ダミー用の全国ジムデータベース（検索された駅の近くに自動配置される仕組みを下に作りました）
        const gymDatabase = [
            { name: "エニタイムフィットネス 瑞江店", address: "江戸川区瑞江1-19-1", price: "¥7,150", distance: "0.4km" },
            { name: "エニタイムフィットネス 篠崎店", address: "江戸川区篠崎町7-21", price: "¥7,480", distance: "1.2km" },
            { name: "エニタイムフィットネス 一之江店", address: "江戸川区一之江8-13", price: "¥6,980", distance: "2.1km" }
        ];

        let currentMarkers = [];

        // 起動時に初期位置のジムを表示
        updateGymList(35.6931, 139.8979, "瑞江駅");

        // ⌨️ エンターキーで検索
        function handleKeyPress(event) {
            if (event.key === 'Enter') searchStation();
        }

        // 🚀 【重要】国土地理院やOpenStreetMapの無料データを使って、文字から緯度経度を自動取得する関数
        function searchStation() {
            const query = document.getElementById('stationInput').value.trim();
            if (!query) {
                alert("駅名や地名を入力してください。");
                return;
            }

            // 日本国内の場所に限定して検索する無料の検索APIURL
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&countrycodes=jp`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data && data.length > 0) {
                        const lat = parseFloat(data[0].lat);
                        const lng = parseFloat(data[0].lon);
                        
                        // 地図を検索された場所にジャンプ！
                        map.setView([lat, lng], 14);
                        
                        // その駅の周辺にジムカードとピンを再配置
                        updateGymList(lat, lng, query);
                    } else {
                        alert(`「${query}」が見つかりませんでした。別の駅名や地名で試してください。`);
                    }
                })
                .catch(error => {
                    console.error("Error:", error);
                    alert("検索中にエラーが発生しました。");
                });
        }

        // 地図と左側リストを連動更新する処理
        function updateGymList(centerLat, centerLng, stationName) {
            const gymGrid = document.getElementById('gymGrid');
            gymGrid.innerHTML = "";
            
            // 古いピンを全部消去
            currentMarkers.forEach(m => map.removeLayer(m));
            currentMarkers = [];

            // 検索された駅の周りに、それっぽい位置でピンを3つ自動生成して配置（シミュレーション）
            const offsets = [
                { lat: 0.002, lng: -0.003, d: "0.3km" },
                { lat: -0.004, lng: 0.005, d: "0.8km" },
                { lat: 0.006, lng: 0.002, d: "1.5km" }
            ];

            gymDatabase.forEach((gym, index) => {
                const finalLat = centerLat + offsets[index].lat;
                const finalLng = centerLng + offsets[index].lng;
                const finalDist = offsets[index].d;

                // 1. 地図にピン（マーカー）を立てる
                const marker = L.marker([finalLat, finalLng]).addTo(map);
                marker.bindPopup(`<b>${gym.name}</b><br>価格: ${gym.price}<br>${stationName}から ${finalDist}`);
                currentMarkers.push(marker);

                // 2. 左側に本家そっくりのカードを作成
                const card = document.createElement('div');
                card.className = 'gym-card';
                card.innerHTML = `
                    <div class="card-left-info">
                        <h3>${gym.name}</h3>
                        <p class="gym-address"><i class="fa-solid fa-location-dot"></i> ${gym.address}</p>
                        <p class="gym-walk"><i class="fa-solid fa-person-walking"></i> ${stationName}から ${finalDist}</p>
                    </div>
                    <div class="card-right-actions">
                        <div class="price-badge">${gym.price} <span class="price-tax">通常価格（税込）</span></div>
                        <button class="btn-detail" onclick="focusGym(${finalLat}, ${finalLng}, ${index})"><i class="fa-solid fa-circle-info"></i> 詳細</button>
                        <a href="#" class="btn-website" target="_blank"><i class="fa-solid fa-arrow-up-right-from-square"></i> 公式サイト</a>
                    </div>
                `;
                gymGrid.appendChild(card);
            });

            document.getElementById('resultsCount').innerText = `${gymDatabase.length}店舗`;
        }

        function focusGym(lat, lng, index) {
            map.setView([lat, lng], 16);
            currentMarkers[index].openPopup();
        }

        function searchCurrentLocation() {
            if (!navigator.geolocation) {
                alert("お使いのブラウザは位置情報に対応していません。");
                return;
            }
            navigator.geolocation.getCurrentPosition(position => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                map.setView([lat, lng], 14);
                updateGymList(lat, lng, "現在地");
            }, () => {
                alert("位置情報の取得に失敗しました。");
            });
        }
    </script>
</body>
</html>
