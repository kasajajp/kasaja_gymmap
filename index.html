<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ジムマップ | 全国のジムを地図から探す</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <header class="site-header">
        <div class="header-logo">🏋️ GymMap</div>
        <nav class="header-nav">
            <a href="https://kasajajp.github.io/">KASAJA.jp ホーム</a>
        </nav>
    </header>

    <main class="main-container">
        
        <div class="hero-section">
            <h1>全国のジムを地図から探す</h1>
            <p>PC・携帯それぞれに最適化したマップ検索サイト</p>
        </div>

        <div class="layout-flex">
            
            <section class="search-area">
                <h2>都道府県から探す</h2>
                
                <div class="area-group">
                    <span class="area-label">関東</span>
                    <div class="buttons">
                        <button onclick="moveMap([35.6812, 139.7671], 12)">東京</button>
                        <button onclick="moveMap([35.4477, 139.6425], 12)">神奈川</button>
                    </div>
                </div>

                <div class="area-group">
                    <span class="area-label">関西</span>
                    <div class="buttons">
                        <button onclick="moveMap([34.6937, 135.5023], 12)">大阪</button>
                        <button onclick="moveMap([35.0116, 135.7681], 12)">京都</button>
                    </div>
                </div>
            </section>

            <section class="map-section">
                <div id="map"></div>
            </section>

        </div>

    </main>

    <script>
        const map = L.map('map').setView([35.681236, 139.767125], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function moveMap(coords, zoom) {
            map.setView(coords, zoom);
        }
    </script>
</body>
</html>
