<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymMap ジムマップ | 全国店舗の月額料金を地図で比較</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <header class="site-header">
        <div class="header-logo">
            <span class="logo-emoji">🏋️</span>
            <span class="logo-text">GymMap</span>
            <span class="logo-sub">ジムマップ</span>
        </div>
        <nav class="header-nav">
            <a href="https://kasajajp.github.io/">KASAJA.jp ホーム</a>
        </nav>
    </header>

    <section class="hero-section">
        <div class="hero-content">
            <h1>エニタイムフィットネス全国店舗の月額料金を地図で比較</h1>
            
            <div class="comparison-box">
                <p class="comparison-note">例えば...</p>
                <p class="comparison-text">エニタイムフィットネスは全国どこでも利用できるのに<br>入会する店舗によって月額料金に大きな差があります</p>
                <div class="price-display">
                    <div class="price-item">
                        <span class="shop-name">A店</span>
                        <span class="price-value">9,800円</span>
                    </div>
                    <div class="price-divider">/</div>
                    <div class="price-item">
                        <span class="shop-name">B店</span>
                        <span class="price-value">6,800円</span>
                    </div>
                </div>
            </div>

            <div class="main-search-bar">
                <div class="search-input-wrapper">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="stationInput" placeholder="駅名・地名を入力（例：瑞江、渋谷）" onkeypress="handleKeyPress(event)">
                    <button class="search-submit-btn" onclick="searchStation()"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
                <button class="btn-current-location" onclick="searchCurrentLocation()">
                    <i class="fa-solid fa-location-crosshairs"></i> 現在地点で検索
                </button>
            </div>
        </div>
    </section>

    <section class="filter-section">
        <div class="filter-container">
            <div class="filter-item">
                <select>
                    <option>エニタイムフィットネス</option>
                </select>
            </div>
            <div class="filter-item">
                <select>
                    <option>すべてのプラン</option>
                </select>
            </div>
            <div class="filter-item slider-item">
                <span class="filter-label">料金:</span>
                <input type="range" min="5000" max="15000" value="10000">
                <span class="filter-val-badge">¥10,000</span>
            </div>
            <div class="filter-item slider-item">
                <span class="filter-label">距離:</span>
                <input type="range" min="1" max="30" value="10">
                <span class="filter-val-badge">10km</span>
            </div>
            <div class="filter-item sort-item">
                <span class="filter-label">並び順:</span>
                <button class="btn-sort active">料金順</button>
                <button class="btn-sort">距離順</button>
            </div>
        </div>
    </section>

    <main class="main-container">
        <div class="layout-flex">
            
            <div class="left-panel">
                <div class="results-header">
                    <h2>検索結果</h2>
                    <span class="results-count" id="resultsCount">3店舗</span>
                </div>
                <div class="gym-grid" id="gymGrid">
                    </div>
            </div>

            <div class="right-panel">
                <div class="map-header">
                    <h2>店舗マップ</h2>
                </div>
                <div id="map"></div>
            </div>

        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; GymMap / KASAJA.jp All Rights Reserved.</p>
    </footer>

    <script>
const map = L.map('map').setView([35.6812, 139.7671], 11); // 最初は少し広めに東京を表示

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let gymDatabase = [];
let currentMarkers = [];

// 1. ページが開かれた瞬間に、Pythonが作った『gym_data.json』をロード
fetch('gym_data.json')
    .then(response => response.json())
    .then(data => {
        gymDatabase = data; 
        updateGymList(gymDatabase, "全国"); // 最初は全店舗を表示
    })
    .catch(error => {
        console.error("データファイルの読み込みに失敗しました:", error);
    });

function handleKeyPress(event) {
    if (event.key === 'Enter') searchStation();
}

// 2. 🔥 【重要】ここが連動の心臓部です！
function searchStation() {
    const query = document.getElementById('stationInput').value.trim();
    if (!query) {
        updateGymList(gymDatabase, "全国");
        map.setView([35.6812, 139.7671], 11);
        return;
    }

    // 無料のインターネット地図検索(API)を使って、入力された駅名（例：「池袋」）の正確な緯度経度を取得
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&countrycodes=jp`;
    
    fetch(url)
        .then(response => response.json())
        .then(data => {
            if (data && data.length > 0) {
                const searchLat = parseFloat(data[0].lat);
                const searchLng = parseFloat(data[0].lon);
                
                // ① 地図を入力された駅にジャンプさせる！
                map.setView([searchLat, searchLng], 14);
                
                // ② 【ここが修正ポイント】
                // データベース(JSON)の中にある全ジムと、検索された駅の「直線距離」を全部計算して、
                // 「半径 5km 以内」にあるジムだけを自動で抜き出す（フィルタリングする）
                const nearbyGyms = gymDatabase.filter(gym => {
                    const distance = getDistance(searchLat, searchLng, gym.lat, gym.lng);
                    gym.currentDistance = distance; // 計算した距離を一時的にジムデータに保存
                    return distance <= 5.0; // 5km以内のジムだけを合格にする（ここの数字を変えれば範囲調整可能）
                });

                // ③ 絞り込まれたジムだけで、左側のリストと地図のピンを書き換える！
                updateGymList(nearbyGyms, query);
                
            } else {
                alert(`「${query}」の位置が見つかりませんでした。別の駅名で試してください。`);
            }
        })
        .catch(error => {
            console.error("検索エラー:", error);
            alert("検索中にエラーが発生しました。");
        });
}

// 3. 緯度経度から2点間の直線距離（km）を計算する魔法の数学式
function getDistance(lat1, lng1, lat2, lng2) {
    const R = 6371; // 地球の半径 (km)
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLng / 2) * Math.sin(dLng / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
}

// 4. リストとピンを再描画する関数
function updateGymList(gymsToShow, stationName) {
    const gymGrid = document.getElementById('gymGrid');
    gymGrid.innerHTML = "";
    
    // 古いピンを全部消す
    currentMarkers.forEach(m => map.removeLayer(m));
    currentMarkers = [];

    if (gymsToShow.length === 0) {
        gymGrid.innerHTML = `<p style='padding:20px; color:#666;'>${stationName}駅の周辺（5km以内）に該当するジムのデータがありません。</p>`;
        document.getElementById('resultsCount').innerText = "0店舗";
        return;
    }

    // 表示するジムをループ処理
    gymsToShow.forEach((gym, index) => {
        // 地図にピンを立てる
        const marker = L.marker([gym.lat, gym.lng]).addTo(map);
        marker.bindPopup(`<b>${gym.name}</b><br>価格: ${gym.price}<br><a href="${gym.url}" target="_blank">公式サイト</a>`);
        currentMarkers.push(marker);

        // 距離の表示テキスト（検索時のみ「〇〇駅から○km」と表示）
        const distanceText = gym.currentDistance ? `${stationName}から ${gym.currentDistance.toFixed(1)}km` : `${gym.station}駅 周辺`;

        // 左側のカードを生成
        const card = document.createElement('div');
        card.className = 'gym-card';
        card.innerHTML = `
            <div class="card-left-info">
                <h3>${gym.name}</h3>
                <p class="gym-address"><i class="fa-solid fa-location-dot"></i> ${gym.address}</p>
                <p class="gym-walk"><i class="fa-solid fa-train"></i> ${distanceText}</p>
            </div>
            <div class="card-right-actions">
                <div class="price-badge">${gym.price} <span class="price-tax">通常価格（税込）</span></div>
                <button class="btn-detail" onclick="focusGym(${gym.lat}, ${gym.lng}, ${index})"><i class="fa-solid fa-map-pin"></i> 位置を見る</button>
                <a href="${gym.url}" class="btn-website" target="_blank"><i class="fa-solid fa-arrow-up-right-from-square"></i> 公式サイト</a>
            </div>
        `;
        gymGrid.appendChild(card);
    });

    // 件数バッジの数値を更新
    document.getElementById('resultsCount').innerText = `${gymsToShow.length}店舗`;
}

function focusGym(lat, lng, index) {
    map.setView([lat, lng], 16);
    if(currentMarkers[index]) currentMarkers[index].openPopup();
}
    </script>
</body>
</html>
