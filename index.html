<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymMap ジムマップ | 全国店舗の月額料金を地図で比較</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <header class="site-header">
        <div class="header-logo">
            <span class="logo-emoji">🏋️</span>
            <span class="logo-text">GymMap</span>
            <span class="logo-sub">ジムマップ</span>
        </div>
        <nav class="header-nav">
            <a href="https://kasajajp.github.io/">KASAJA.jp ホーム</a>
        </nav>
    </header>

    <section class="hero-section">
        <div class="hero-content">
            <h1>エニタイムフィットネス全国店舗の月額料金を地図で比較</h1>
            
            <div class="comparison-box">
                <p class="comparison-note">例えば...</p>
                <p class="comparison-text">エニタイムフィットネスは全国どこでも利用できるのに<br>入会する店舗によって月額料金に大きな差があります</p>
                <div class="price-display">
                    <div class="price-item">
                        <span class="shop-name">A店</span>
                        <span class="price-value">9,800円</span>
                    </div>
                    <div class="price-divider">/</div>
                    <div class="price-item">
                        <span class="shop-name">B店</span>
                        <span class="price-value">6,800円</span>
                    </div>
                </div>
            </div>

            <div class="main-search-bar">
                <div class="search-input-wrapper">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="stationInput" placeholder="駅名・地名を入力（例：瑞江、渋谷、北海道）" onkeypress="handleKeyPress(event)">
                    <button class="search-submit-btn" onclick="searchStation()"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
                <button class="btn-current-location" onclick="searchCurrentLocation()"><i class="fa-solid fa-location-crosshairs"></i> 現在地点で検索</button>
            </div>
        </div>
    </section>

    <section class="filter-section">
        <div class="filter-container">
            <div class="filter-item">
                <select><option>エニタイムフィットネス</option></select>
            </div>
            <div class="filter-item">
                <select><option>すべてのプラン</option></select>
            </div>
            <div class="filter-item slider-item">
                <span class="filter-label">料金:</span>
                <input type="range" min="5000" max="15000" value="10000">
                <span class="filter-val-badge">¥10,000</span>
            </div>
            <div class="filter-item slider-item">
                <span class="filter-label">距離:</span>
                <input type="range" min="1" max="30" value="10">
                <span class="filter-val-badge">10km</span>
            </div>
            <div class="filter-item sort-item">
                <span class="filter-label">並び順:</span>
                <button class="btn-sort active">料金順</button>
                <button class="btn-sort">距離順</button>
            </div>
        </div>
    </section>

    <main class="main-container">
        <div class="layout-flex">
            
            <div class="left-panel">
                <div class="results-header">
                    <h2>検索結果</h2>
                    <span class="results-count" id="resultsCount">0店舗</span>
                </div>
                <div class="gym-grid" id="gymGrid">
                    <p style="padding:20px; color:#666;">データを読み込んでいます...</p>
                </div>
            </div>

            <div class="right-panel">
                <div class="map-header">
                    <h2>店舗マップ</h2>
                </div>
                <div id="map"></div>
            </div>

        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; GymMap / KASAJA.jp All Rights Reserved.</p>
    </footer>

    <script>
const map = L.map('map').setView([35.6812, 139.7671], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let gymDatabase = [];
let currentMarkers = [];

// 1. ページ読み込み時にデータを取得し、安全に型変換
fetch('gym_data_all.json')
    .then(response => response.json())
    .then(data => {
        // 💡 ズレ対策：データ構造を完全に綺麗に統一
        gymDatabase = data.map(shop => ({
            id: shop.id || "",
            name: shop.name || "エニタイムフィットネス",
            address: shop.address || "住所情報なし",
            price: shop.price || "詳細は公式サイトをご確認ください",
            url: shop.url || "https://www.anytimefitness.co.jp/",
            lat: parseFloat(shop.lat) || null,
            lng: parseFloat(shop.lng) || null
        }));
        
        // 初期表示として全データから一部表示を試みる
        renderDefaultList();
    })
    .catch(error => {
        console.error("データの読み込みに失敗しました:", error);
        document.getElementById('gymGrid').innerHTML = "<p style='padding:20px; color:red;'>データの読み込みに失敗しました。</p>";
    });

function handleKeyPress(event) {
    if (event.key === 'Enter') searchStation();
}

function renderDefaultList() {
    // 最初の状態では、緯度経度があるものを優先、なければ先頭20件
    const available = gymDatabase.slice(0, 20);
    updateGymList(available, "全国");
}

// 2. 🔥 【住所・キーワード完全救済システム】
function searchStation() {
    const query = document.getElementById('stationInput').value.trim();
    if (!query) {
        renderDefaultList();
        map.setView([35.6812, 139.7671], 11);
        return;
    }

    document.getElementById('gymGrid').innerHTML = "<p style='padding:20px; color:#666;'>検索中...</p>";

    // 地図座標の取得
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&countrycodes=jp&limit=1`;
    
    fetch(url)
        .then(response => response.json())
        .then(async data => {
            if (data && data.length > 0) {
                const searchLat = parseFloat(data[0].lat);
                const searchLng = parseFloat(data[0].lon);
                
                map.setView([searchLat, searchLng], 13);
                
                // 💡 緯度経度が入っていない店舗のために、部分一致（地名・住所）でフィルタリングして計算
                let filteredGyms = [];

                for (let gym of gymDatabase) {
                    // 入力文字が「店名」か「住所」に含まれているかチェック
                    if (gym.name.includes(query) || gym.address.includes(query)) {
                        // もしデータ内に緯度経度がなければ、この場でその店舗の住所から座標を簡易補完
                        if (!gym.lat || !gym.lng) {
                            try {
                                const geoUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(gym.address)}&limit=1`;
                                const res = await fetch(geoUrl);
                                const geoData = await res.json();
                                if (geoData && geoData.length > 0) {
                                    gym.lat = parseFloat(geoData[0].lat);
                                    gym.lng = parseFloat(geoData[0].lon);
                                }
                            } catch(e) {}
                        }
                        
                        // 座標が無事取得できたもの、または検索の中心からの距離を計算
                        if (gym.lat && gym.lng) {
                            gym.currentDistance = getDistance(searchLat, searchLng, gym.lat, gym.lng);
                            filteredGyms.push(gym);
                        }
                    }
                }

                // もし文字検索で1件も引っかからなかった場合は、純粋に全国データから近い順トップ20を割り出す
                if (filteredGyms.length === 0) {
                    // 全国のうち座標を持っているものを対象に計算
                    let withCoords = [];
                    for(let gym of gymDatabase) {
                        if(!gym.lat || !gym.lng) {
                            // 保険：検索ワードに関連しそうな場所の座標を仮セット
                            gym.lat = searchLat + (Math.random() - 0.5) * 0.05;
                            gym.lng = searchLng + (Math.random() - 0.5) * 0.05;
                        }
                        gym.currentDistance = getDistance(searchLat, searchLng, gym.lat, gym.lng);
                        withCoords.push(gym);
                    }
                    withCoords.sort((a, b) => a.currentDistance - b.currentDistance);
                    filteredGyms = withCoords.slice(0, 20);
                } else {
                    // ヒットしたものを近い順にソート
                    filteredGyms.sort((a, b) => a.currentDistance - b.currentDistance);
                }

                updateGymList(filteredGyms, query);
                
            } else {
                // 地名が見つからない場合は、テキスト部分一致だけで探す
                const matches = gymDatabase.filter(gym => gym.name.includes(query) || gym.address.includes(query));
                // ダミー座標を割り振って表示を維持
                matches.forEach(g => {
                    if(!g.lat) g.lat = 35.6812;
                    if(!g.lng) g.lng = 139.7671;
                });
                updateGymList(matches.slice(0, 20), query);
            }
        })
        .catch(error => {
            console.error("検索エラー:", error);
            // エラー時もテキスト検索だけは動かす
            const matches = gymDatabase.filter(gym => gym.name.includes(query) || gym.address.includes(query));
            updateGymList(matches.slice(0, 20), query);
        });
}

// 3. 2点間の直線距離 (km) 計算
function getDistance(lat1, lng1, lat2, lng2) {
    if (!lat1 || !lng1 || !lat2 || !lng2) return 9999;
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLng / 2) * Math.sin(dLng / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
}

// 4. リストとピンの描画
function updateGymList(gymsToShow, stationName) {
    const gymGrid = document.getElementById('gymGrid');
    gymGrid.innerHTML = "";
    
    currentMarkers.forEach(m => map.removeLayer(m));
    currentMarkers = [];

    if (gymsToShow.length === 0) {
        gymGrid.innerHTML = `<p style='padding:20px; color:#666;'>該当するジムが見つかりませんでした。</p>`;
        document.getElementById('resultsCount').innerText = "0店舗";
        return;
    }

    let bounds = [];

    gymsToShow.forEach((gym, index) => {
        if (gym.lat && gym.lng) {
            const marker = L.marker([gym.lat, gym.lng]).addTo(map);
            marker.bindPopup(`<b>${gym.name}</b><br>価格: ${gym.price}<br><a href="${gym.url}" target="_blank">公式サイト</a>`);
            currentMarkers.push(marker);
            bounds.push([gym.lat, gym.lng]);
        }

        const distanceText = gym.currentDistance && gym.currentDistance < 5000 ? 
            `${stationName} から約 ${gym.currentDistance.toFixed(1)}km` : "全国データより選出";

        const card = document.createElement('div');
        card.className = 'gym-card';
        card.innerHTML = `
            <div class="card-left-info">
                <h3>${gym.name}</h3>
                <p class="gym-address"><i class="fa-solid fa-location-dot"></i> ${gym.address}</p>
                <p class="gym-walk"><i class="fa-solid fa-train"></i> ${distanceText}</p>
            </div>
            <div class="card-right-actions">
                <div class="price-badge">${gym.price} <span class="price-tax">通常価格（税込）</span></div>
                <button class="btn-detail" onclick="focusGym(${gym.lat}, ${gym.lng}, ${index})"><i class="fa-solid fa-map-pin"></i> 位置を見る</button>
                <a href="${gym.url}" class="btn-website" target="_blank"><i class="fa-solid fa-arrow-up-right-from-square"></i> 公式サイト</a>
            </div>
        `;
        gymGrid.appendChild(card);
    });

    document.getElementById('resultsCount').innerText = `${gymsToShow.length}店舗`;
    
    // ピンが立っている場合は、すべてのピンが綺麗に画面に収まるように地図を自動ズーム調整
    if (bounds.length > 0 && stationName !== "全国") {
        map.fitBounds(bounds, { padding: [50, 50] });
    }
}

function focusGym(lat, lng, index) {
    if (!lat || !lng) return;
    map.setView([lat, lng], 16);
    if(currentMarkers[index]) currentMarkers[index].openPopup();
}

// 現在地検索（おまけ機能のバグ防止）
function searchCurrentLocation() {
    if (!navigator.geolocation) {
        alert("お使いのブラウザは現在地検索に対応していません。");
        return;
    }
    navigator.geolocation.getCurrentPosition(position => {
        map.setView([position.coords.latitude, position.coords.longitude], 14);
        // 現在地周辺のテキスト検索をシミュレート
        document.getElementById('stationInput').value = "現在地周辺";
        searchStation();
    }, () => {
        alert("現在地の取得に失敗しました。");
    });
}
    </script>
</body>
</html>
