<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エニタイムフィットネス マップ検索</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #search-box { padding: 10px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 1000; display: flex; gap: 10px; }
        #searchInput { flex: 1; padding: 8px; font-size: 16px; }
        #searchBtn { padding: 8px 15px; background: #7331c6; color: white; border: none; cursor: pointer; font-size: 16px; font-weight: bold; }
        #map { flex: 1; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="search-box">
        <input type="text" id="searchInput" placeholder="例: 葛西, 江戸川区, 新宿" onkeypress="if(event.key==='Enter') searchGyms()">
        <button id="searchBtn" onclick="searchGyms()">検索</button>
    </div>

    <div id="map"></div>

    <script>
        // 1. 地図の初期化（最初は東京を中心に表示）
        const map = L.map('map').setView([35.6812, 139.7671], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let allGymData = [];
        let markers = [];

        // 2. Pythonでせっかく作った「本物の緯度経度入りJSON」を読み込む
        fetch('gym_data_all.json')
            .then(response => response.json())
            .then(data => {
                allGymData = data;
                console.log("データ読み込み完了:", allGymData.length, "店舗");
            })
            .catch(error => console.error("データ読み込みエラー:", error));

        // 古いピンを消去する関数
        function clearMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
        }

        // 3. 🔍 バグる距離計算を完全に捨てた、100%確実な文字一致ロジック
        function searchGyms() {
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) return;

            // 💡 住所や店名に、入力した文字（例:「葛西」）が本当に書かれている店舗だけを抜き出す！
            // これで、住所に葛西と入っていないおゆみ野店や大崎店は100%完全に排除されます。
            const filteredGyms = allGymData.filter(gym => {
                const address = gym.address || "";
                const name = gym.name || "";
                return address.includes(keyword) || name.includes(keyword);
            });

            clearMarkers();

            if (filteredGyms.length === 0) {
                alert("該当する店舗が見つかりませんでした。");
                return;
            }

            let firstCoords = null;

            // 4. 抽出された「本当の葛西の店舗だけ」をマップに配置
            filteredGyms.forEach(gym => {
                // Python側でデータの中にしっかり lat, lng を入れてくれたので、それを使います
                if (gym.lat && gym.lng) {
                    const lat = parseFloat(gym.lat);
                    const lng = parseFloat(gym.lng);

                    if (!firstCoords) {
                        firstCoords = [lat, lng];
                    }

                    // 地図にピンを立てる
                    const marker = L.marker([lat, lng]).addTo(map)
                        .bindPopup(`<b>${gym.name}</b><br>${gym.address}<br>料金: ${gym.price}<br><a href="${gym.url}" target="_blank">店舗サイト</a>`);
                    markers.push(marker);
                }
            });

            // 5. 葛西の店舗がある場所に地図をジャンプさせる
            if (firstCoords) {
                map.setView(firstCoords, 14);
            } else {
                alert("店舗の座標データが見つかりませんでした。");
            }
        }
    </script>
</body>
</html>
